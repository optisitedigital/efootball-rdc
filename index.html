<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiFoot | Global eFootball</title>

    <!-- SEO -->
    <meta name="description" content="Rejoins l'élite d'eFootball sur OptiFoot. Tournois mondiaux, scores en live et récompenses réelles.">

    <!-- OPEN GRAPH -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="OptiFoot">
    <meta property="og:title" content="OptiFoot | Global eFootball Tournament">
    <meta property="og:description" content="Affronte les meilleurs joueurs, monte dans le classement et gagne des prix.">
    <meta property="og:image" content="https://tonsite.com/images/optifoot-banner.png">
    <meta property="og:image:secure_url" content="https://tonsite.com/images/optifoot-banner.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    <meta property="og:url" content="https://tonsite.com">

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="OptiFoot | Global eFootball">
    <meta name="twitter:description" content="L'arène ultime pour les joueurs eFootball.">
    <meta name="twitter:image" content="https://tonsite.com/images/optifoot-banner.png">

    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/532/532195.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --noir: #000000; 
            --blanc: #ffffff; 
            --gris: #111111; 
            --vert-wa: #25D366;
            --fluo-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--noir); color: var(--blanc); margin: 0; overflow-x: hidden; }

        #splash { 
            position: fixed; inset: 0; background: var(--noir); 
            display: flex; justify-content: center; align-items: center; 
            z-index: 10000; animation: fadeOut 1.5s ease forwards; 
        }
        .splash-logo { 
            font-family: 'Orbitron'; font-size: 1.5rem; letter-spacing: 5px; 
            border: 2px solid white; padding: 15px; box-shadow: var(--fluo-shadow);
        }
        @keyframes fadeOut { 85% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: rgba(0,0,0,0.95); 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; 
        }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem; letter-spacing: 2px; }
        
        .burger { cursor: pointer; padding: 5px; z-index: 1001; }
        .burger div { width: 25px; height: 2px; background: var(--blanc); margin: 6px; }

        .nav-links { 
            display: none; flex-direction: column; position: absolute; 
            top: 100%; left: 0; width: 100%; background: var(--noir); 
            padding: 20px; gap: 20px; border-bottom: 2px solid #fff; 
        }
        .nav-links.active { display: flex; }

        .hero-container {
            padding: 10px;
        }

        .hero { 
            height: 50vh;
            background: url('https://tonsite.com/images/optifoot-banner.png') center/cover no-repeat; 
            display: flex; align-items: center; justify-content: center;
            position: relative;
            border: 2px solid #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
        }

        .hero h1 {
            font-family: 'Orbitron';
            font-size: 1.6rem;
            z-index: 1;
            padding: 12px 25px;
            border: 1px solid white;
            box-shadow: var(--fluo-shadow);
        }

        .section { display: none; padding: 40px 20px; max-width: 600px; margin: auto; min-height: 80vh; }
        .section.active { display: block; }

        .news-img {
            width: 100%;
            border: 1px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .btn-main {
            background: var(--blanc);
            color: var(--noir);
            padding: 20px;
            width: 100%;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Orbitron';
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: scale(1.05);
            box-shadow: var(--fluo-shadow);
        }

        .btn-whatsapp {
            background: var(--vert-wa);
            color: white;
            display: flex;
            justify-content: center;
            padding: 18px;
            font-weight: 900;
            margin-top: 25px;
        }
    </style>
</head>

<body>

<div id="splash"><div class="splash-logo">OPTIFOOT GLOBAL</div></div>

<nav>
    <div class="logo">OPTIFOOT</div>
    <div class="burger" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>
    <div class="nav-links" id="menu">
        <a onclick="show('accueil')">Accueil</a>
        <a onclick="show('actu')">Actualité & Scores</a>
        <a onclick="show('inscription')">S'inscrire</a>
    </div>
</nav>

<div id="accueil" class="section active">
    <div class="hero-container">
        <div class="hero">
            <h1>GLOBAL TOURNAMENT</h1>
        </div>
    </div>
</div>

<script>
function toggleMenu() { document.getElementById('menu').classList.toggle('active'); }
</script>

</body>
</html>
