<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiFoot | Tournoi eFootball RDC</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/64/3169/3169575.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root { --noir: #0a0a0a; --blanc: #ffffff; --rose: #ff007f; }
        body { font-family: 'Orbitron', sans-serif; background: var(--blanc); color: var(--noir); margin: 0; }

        #splash { position: fixed; inset: 0; background: var(--noir); color: var(--blanc); display: flex; justify-content: center; align-items: center; z-index: 9999; animation: fadeOut 2s ease forwards; }
        .splash-text { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; border: 4px solid var(--rose); padding: 20px; text-align: center; }
        @keyframes fadeOut { 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        nav { display: flex; justify-content: center; gap: 20px; padding: 20px; background: var(--noir); color: var(--blanc); position: sticky; top: 0; z-index: 100; }
        nav a { font-weight: 900; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; color: white; text-decoration: none; }
        nav a:hover { color: var(--rose); }

        .section { display: none; padding: 40px 20px; max-width: 800px; margin: auto; }
        .active { display: block; }

        .hero-container { position: relative; width: 100%; margin-bottom: 30px; }
        .hero-img { width: 100%; height: 400px; object-fit: cover; border-bottom: 8px solid var(--rose); }
        .hero-title { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.7); padding: 20px; font-size: 1.8rem; text-transform: uppercase; text-align: center; border: 2px solid var(--rose); width: 85%; }

        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid var(--noir); box-sizing: border-box; }
        .checkbox-container { display: flex; align-items: center; gap: 10px; margin: 20px 0; font-weight: bold; font-family: sans-serif; }
        button { background: var(--rose); color: #fff; padding: 20px; width: 100%; border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; }
        
        /* Correction image cassée */
        .news-img { width: 100%; border-bottom: 4px solid var(--rose); display: block; }
        .news-img[src=""], .news-img:not([src]) { display: none; }
    </style>
</head>
<body>

    <div id="splash"><div class="splash-text">EFOOTBALL RDC</div></div>

    <nav>
        <a onclick="show('accueil')">ACCUEIL</a>
        <a onclick="show('actu')">ACTUALITÉ</a>
        <a onclick="show('inscription')">INSCRIPTION</a>
    </nav>

    <div id="accueil" class="section active">
        <div class="hero-container">
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200" class="hero-img">
            <div class="hero-title">TOURNOI EFOOTBALL RDC</div>
        </div>
        <h2>À PROPOS</h2>
        <p style="font-family: sans-serif;">OptiFoot est la plateforme officielle dédiée aux compétitions eFootball en République Démocratique du Congo.</p>
    </div>

    <div id="actu" class="section">
        <h2>ACTUALITÉ ET RÉSULTATS</h2>
        <div id="news-list"></div>
    </div>

    <div id="inscription" class="section">
        <h2>INSCRIPTION JOUEUR</h2>
        <input type="text" id="nom" placeholder="NOM COMPLET">
        <input type="text" id="id_efoot" placeholder="IDENTIFIANT EFOOTBALL">
        <select id="prov">
            <option>KINSHASA</option><option>GOMA</option><option>LUBUMBASHI</option><option>AUTRE</option>
        </select>
        <div class="checkbox-container">
            <input type="checkbox" id="possede_efoot" style="width: 20px; height: 20px;">
            <label for="possede_efoot">AS-TU EFOOTBALL ?</label>
        </div>
        <button onclick="valider()">VALIDER MA PARTICIPATION</button>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7KOJZ3ABCxF7HD17Gwhgtc3HisOSr8ve3BBXX7AKMdU8n6D4Z5MtDBLn7XTHBsU3Ro_zrHMjlyki9/pub?output=csv";

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function loadNews() {
            try {
                const res = await fetch(SHEET_URL);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                const container = document.getElementById('news-list');
                container.innerHTML = "";

                rows.forEach(row => {
                    // On découpe la ligne, en gérant les lignes vides
                    if (row.trim() === "") return;
                    const cols = row.split(','); 
                    
                    if(cols.length >= 3) {
                        const titre = cols[0];
                        const desc = cols[1];
                        const imgUrl = cols[2].trim();

                        container.innerHTML += `
                            <div style="margin-bottom:40px">
                                <h3>${titre}</h3>
                                ${imgUrl ? `<img src="${imgUrl}" class="news-img" onerror="this.style.display='none'">` : ''}
                                <p style="font-family:sans-serif">${desc}</p>
                            </div>`;
                    }
                });
            } catch (err) {
                console.error("Erreur de chargement :", err);
            }
        }

        function valider() {
            const n = document.getElementById('nom').value;
            const id = document.getElementById('id_efoot').value;
            const possede = document.getElementById('possede_efoot').checked ? "OUI" : "NON";
            if(!n || !id) { alert("Veuillez remplir tous les champs."); return; }
            window.open(`https://wa.me/243977092549?text=INSCRIPTION OPTIFOOT%0ANom: ${n}%0AIdentifiant: ${id}%0APossède eFootball: ${possede}`);
        }
        
        loadNews();
    </script>
</body>
</html>
