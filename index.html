<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark GPT | IA Nouvelle Génération</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #e11d48; 
            --accent-glow: rgba(225, 29, 72, 0.4);
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #2a050c, transparent);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER AVEC LOGO ROND */
        header {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .logo-wrapper {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            padding: 3px;
            background: #000;
            box-shadow: 0 0 25px var(--accent-glow);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .logo-wrapper:hover {
            transform: scale(1.05);
        }

        header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 5px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text);
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* ZONE DE CHAT */
        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-message {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px 20px 20px 5px;
            color: #f1f5f9;
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), #9f1239);
            color: white;
            border-radius: 20px 20px 5px 20px;
            box-shadow: 0 8px 20px -5px var(--accent-glow);
        }

        /* INPUT AREA */
        .input-wrapper {
            padding: 20px;
            background: #000;
            border-top: 1px solid var(--glass-border);
        }

        .input-box {
            max-width: 600px;
            margin: auto;
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 35px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .input-box:focus-within {
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding-left: 15px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        button:hover { transform: scale(1.1); background: #f43f5e; }

        .typing {
            text-align: center;
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 10px;
            display: none;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-wrapper">
            <img src="logo.png" alt="Dark GPT">
        </div>
        <h1>DARK GPT</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            <i class="fas fa-robot" style="margin-right:8px;"></i>
            Système <b>Dark GPT</b> en ligne. Je suis prêt pour vos requêtes.
        </div>
    </div>

    <div class="input-wrapper">
        <div id="typing-indicator" class="typing">
            <i class="fas fa-spinner fa-spin"></i> CALCUL EN COURS...
        </div>
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Message..." autocomplete="off">
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const MODEL_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-message`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function getAIResponse(prompt) {
            typingIndicator.style.display = 'block';
            try {
                const response = await fetch(MODEL_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Réponds en tant que Dark GPT, une IA mystérieuse, rapide et pro : " + prompt }] }]
                    })
                });
                const data = await response.json();
                typingIndicator.style.display = 'none';
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                typingIndicator.style.display = 'none';
                return "Erreur de connexion. Vérifiez votre réseau.";
            }
        }

        async function handleSend() {
            const msg = userInput.value.trim();
            if (!msg) return;
            addMessage(msg, 'user');
            userInput.value = '';
            const res = await getAIResponse(msg);
            addMessage(res, 'ai');
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
